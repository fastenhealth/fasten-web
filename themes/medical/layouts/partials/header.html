<header>
    <nav class="navbar navbar-expand-lg navbar-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand tx-30 font-weight-bold az-logo" href="#">fasten</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#leadUIMainNav"
                    aria-controls="leadUIMainNav" aria-expanded="false" aria-label="Toggle navigation">
                <i class="typcn icon typcn-th-menu tx-26"></i>
            </button>
            <div class="collapse navbar-collapse" id="leadUIMainNav">
                <ul class="navbar-nav me-auto mt-2 mt-lg-0">
                    {{ range .Site.Menus.main }}
                    {{ $text := print .Name | safeHTML }}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ .URL }}">{{ $text }}</a>
                    </li>
                    {{ end }}
                </ul>
                <div class="form-inline">
                    <button class="btn btn-outline-light"><i class="typcn icon typcn-social-github tx-20"></i> Github</button>
                </div>
            </div>
        </div>
    </nav>
    <div class="landing-sass-header-content bg-dark">
        <div class="container">
            <h1 class="text-center font-weight-bold pt-5 pb-30px mb-0 text-white">All your medical records, <br/> under your control.</h1>
            <br/>
            <div class="text-center mb-5 "><button class="btn btn-light me-3">Get started</button><button class="btn btn-outline-light">Demo video</button></div>
        </div>
    </div>
    <div class="text-center landing-sass-header-img-wrapper"><img src="img/dash/dash_3.png" alt="header-img" class="img-fluid" width="707px"></div>
</header>
